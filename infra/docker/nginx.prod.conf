# NGINX Production Reverse Proxy Configuration
# Multi-app system with frontend (Vite) and dashboard (Next.js 16)

upstream frontend-prod {
    server frontend-prod:80;
}

upstream dashboard-prod {
    server dashboard-prod:3001;
}

server {
    listen 80;
    server_name localhost;

    # Increase body size for file uploads
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check endpoint (exact match, highest priority)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Handle /dashboard without trailing slash (exact match, redirect to /dashboard/)
    location = /dashboard {
        return 301 /dashboard/;
    }

    # Next.js static assets - must be before /dashboard location
    # This ensures /_next/static/* requests are proxied correctly without breaking absolute URLs
    location /_next/static/ {
        proxy_pass http://dashboard-prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Dashboard location block with rewrite
    location /dashboard/ {
        # Remove /dashboard prefix before proxying to Next.js
        rewrite ^/dashboard(/.*)$ $1 break;
        proxy_pass http://dashboard-prod;
        proxy_http_version 1.1;
        
        # Essential headers for Next.js
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /dashboard;
        
        # WebSocket support for Next.js HMR and live updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Frontend (Vite) - root location
    location / {
        proxy_pass http://frontend-prod;
        proxy_http_version 1.1;
        
        # Essential headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Vite HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
